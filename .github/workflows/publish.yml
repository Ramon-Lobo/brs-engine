name: publish

# Publishes @ramonlobo/brs-node (packages/node) to npm. The workspace root stays
# private and is not published. Requires an NPM_TOKEN repo secret with publish
# rights to the @ramonlobo scope.
#
# Trigger by pushing a tag (v2.2.0, v2.2.1, …) or running the workflow manually.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          registry-url: "https://registry.npmjs.org"
      - run: npm install
      # packages/node's prepublishOnly runs `clean && release && build:sg`, so the
      # published bin/ (brs.node.js + brs-sg.node.js) is always freshly built.
      - name: Publish @ramonlobo/brs-node
        working-directory: packages/node
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
